<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A970FF" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#00D2FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#A970FF" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#A970FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00D2FF" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <!-- Wave 1 -->
  <path d="M 0 10 Q 250 0, 500 10 T 1000 10" fill="none" stroke="url(#grad1)" stroke-width="2">
    <animate attributeName="d" 
      values="M 0 10 Q 250 0, 500 10 T 1000 10;
              M 0 10 Q 250 20, 500 10 T 1000 10;
              M 0 10 Q 250 0, 500 10 T 1000 10" 
      dur="6s" repeatCount="indefinite" />
  </path>
  <!-- Wave 2 -->
  <path d="M 0 10 Q 250 20, 500 10 T 1000 10" fill="none" stroke="url(#grad2)" stroke-width="2">
    <animate attributeName="d" 
      values="M 0 10 Q 250 20, 500 10 T 1000 10;
              M 0 10 Q 250 0, 500 10 T 1000 10;
              M 0 10 Q 250 20, 500 10 T 1000 10" 
      dur="4s" repeatCount="indefinite" />
  </path>
</svg>
